# Enterprise Security Configuration
# Advanced security monitoring with ML, threat intelligence, and compliance

# Target configuration
target:
  domain: "obywatel.bielik.ai"
  organization: "Obywatel Bielik Foundation"
  industry: "Technology/Non-Profit"
  compliance_standards: ["GDPR", "ISO27001", "SOC2"]

# Anomaly Detection Configuration
anomaly_detection:
  enabled: true
  algorithm: "statistical_zscore"
  anomaly_threshold: 2.0
  window_size: 100
  baseline_collection_days: 7
  
  # Metrics to monitor
  metrics:
    response_time:
      enabled: true
      threshold_ms: 2000
      weight: 0.4
    
    error_rate:
      enabled: true
      threshold: 0.05  # 5%
      weight: 0.3
    
    content_changes:
      enabled: true
      sensitivity: "medium"
      weight: 0.2
    
    ssl_certificate:
      enabled: true
      expiry_threshold_days: 30
      weight: 0.1

  # Alerting
  alerting:
    enabled: true
    channels: ["email", "webhook", "dashboard"]
    cooldown_minutes: 15
    escalation_enabled: true

# Threat Intelligence Configuration
threat_intelligence:
  enabled: true
  
  # Threat feeds to integrate
  threat_feeds:
    malware_domains:
      enabled: true
      type: "domain_blacklist"
      source: "internal"
      update_interval_hours: 24
      confidence_threshold: 0.7
    
    phishing_indicators:
      enabled: true
      type: "url_blacklist"
      source: "phish_tank"
      api_key: ""
      update_interval_hours: 6
      confidence_threshold: 0.8
    
    ip_reputation:
      enabled: true
      type: "ip_reputation"
      source: "abuseipdb"
      api_key: ""
      update_interval_hours: 12
      confidence_threshold: 0.6
    
    malware_hashes:
      enabled: false
      type: "hash_blacklist"
      source: "virustotal"
      api_key: ""
      update_interval_hours: 4
      confidence_threshold: 0.9

  # Local threat indicators
  local_indicators:
    suspicious_ips:
      - "192.168.1.100"
      - "10.0.0.50"
    
    suspicious_domains:
      - "malicious-example.com"
      - "phishing-site.net"
    
    suspicious_user_agents:
      - "sqlmap"
      - "nikto"
      - "nmap scripting"

  # Indicator matching
  matching:
    content_scan_enabled: true
    log_scan_enabled: true
    network_scan_enabled: false
    case_sensitive: false

# Compliance Management
compliance:
  enabled: true
  
  # Standards to check
  standards:
    GDPR:
      enabled: true
      controls:
        - "Data Protection Headers"
        - "Personal Data Protection"
        - "Cookie Compliance"
        - "Privacy Policy"
        - "Data Breach Notification"
      
      risk_assessment:
        personal_data_scan: true
        cookie_analysis: true
        privacy_policy_check: true
        data_processing_records: true
    
    ISO27001:
      enabled: true
      controls:
        - "A.10.1.1 Cryptographic Controls"
        - "A.13.1.1 Network Security Controls"
        - "A.14.2.5 Secure Development"
        - "A.12.6.1 Management of Technical Vulnerabilities"
        - "A.9.1.1 Access Control Policy"
      
      risk_assessment:
        ssl_configuration: true
        security_headers: true
        vulnerability_management: true
        access_controls: true
    
    SOC2:
      enabled: true
      controls:
        - "CC6.1 Logical Access Controls"
        - "CC7.1 System Boundaries"
        - "CC6.8 System Component Inventory"
        - "CC7.2 Data Classification"
        - "CC6.7 Transmission Encryption"
      
      risk_assessment:
        access_logging: true
        data_classification: true
        encryption_verification: true
        asset_inventory: true
    
    PCI_DSS:
      enabled: false
      controls:
        - "Requirement 1: Firewall Configuration"
        - "Requirement 2: Default Passwords"
        - "Requirement 4: Encryption of Cardholder Data"
        - "Requirement 6: Secure Software Development"
        - "Requirement 10: Tracking and Monitoring"

  # Compliance scoring
  scoring:
    compliant_weight: 100
    partial_weight: 50
    non_compliant_weight: 0
    minimum_score: 80
    
  # Evidence collection
  evidence:
    screenshots: true
    headers_capture: true
    ssl_certificate: true
    content_analysis: true
    automated_scans: true

# Advanced Monitoring
advanced_monitoring:
  enabled: true
  
  # Behavioral analysis
  behavioral_analysis:
    enabled: true
    user_behavior_tracking: false
    bot_detection: true
    anomaly_learning: true
    
  # Performance monitoring
  performance_monitoring:
    enabled: true
    response_time_tracking: true
    availability_monitoring: true
    resource_utilization: false
    
  # Content monitoring
  content_monitoring:
    enabled: true
    change_detection: true
    integrity_verification: true
    malware_scanning: false

# Reporting Configuration
reporting:
  enabled: true
  
  # Report formats
  formats:
    - "json"
    - "markdown"
    - "pdf"
    - "html"
  
  # Report schedule
  schedule:
    daily_report:
      enabled: true
      time: "06:00"
      recipients: ["security-team@company.com"]
      
    weekly_summary:
      enabled: true
      day: "monday"
      time: "09:00"
      recipients: ["management@company.com"]
      
    monthly_executive:
      enabled: true
      day: 1
      time: "08:00"
      recipients: ["executives@company.com"]
      
    quarterly_compliance:
      enabled: true
      frequency: "quarterly"
      recipients: ["compliance@company.com", "auditors@company.com"]
  
  # Report content
  content:
    executive_summary: true
    technical_details: true
    compliance_status: true
    risk_assessment: true
    recommendations: true
    trend_analysis: true
    
  # Report retention
  retention:
    daily_reports_days: 30
    weekly_reports_months: 12
    monthly_reports_years: 3
    quarterly_reports_years: 7

# Integration Configuration
integrations:
  # SIEM integration
  siem:
    enabled: false
    type: "splunk"
    endpoint: "https://splunk.company.com:8088"
    token: ""
    index: "security_events"
    
  # SOAR integration
  soar:
    enabled: false
    type: "cortex_xsoar"
    endpoint: "https://xsoar.company.com"
    api_key: ""
    
  # Ticketing system
  ticketing:
    enabled: false
    type: "jira"
    endpoint: "https://company.atlassian.net"
    username: ""
    api_token: ""
    project: "SEC"
    
  # Cloud security
  cloud_security:
    enabled: false
    provider: "aws"
    region: "us-east-1"
    services: ["guardduty", "security_hub", "macie"]

# Machine Learning Configuration
machine_learning:
  enabled: true
  
  # Anomaly detection models
  anomaly_models:
    statistical:
      enabled: true
      algorithm: "isolation_forest"
      contamination: 0.1
      
    deep_learning:
      enabled: false
      model_type: "lstm_autoencoder"
      sequence_length: 50
      features: ["response_time", "error_rate", "content_length"]
      
    ensemble:
      enabled: false
      models: ["isolation_forest", "one_class_svm", "local_outlier_factor"]
      voting: "majority"

  # Threat intelligence ML
  threat_ml:
    enabled: false
    model_type: "random_forest"
    features: ["domain_age", "ip_reputation", "url_similarity"]
    confidence_threshold: 0.8

# Security Operations
security_operations:
  enabled: true
  
  # Incident response
  incident_response:
    enabled: true
    automated_triage: true
    severity_classification: true
    escalation_rules: true
    
  # Vulnerability management
  vulnerability_management:
    enabled: true
    scanning_enabled: false
    cvss_threshold: 7.0
    remediation_tracking: true
    
  # Security orchestration
  orchestration:
    enabled: false
    playbooks:
      - "security_incident_response"
      - "vulnerability_management"
      - "compliance_violation"

# Data Protection
data_protection:
  enabled: true
  
  # Data classification
  classification:
    enabled: true
    levels: ["public", "internal", "confidential", "restricted"]
    automatic_classification: true
    
  # Data retention
  retention:
    security_events_days: 365
    compliance_data_years: 7
    audit_logs_years: 10
    
  # Privacy protection
  privacy:
    anonymization_enabled: true
    data_minimization: true
    consent_management: false

# Performance and Scaling
performance:
  # Resource limits
  resources:
    max_memory_mb: 512
    max_cpu_percent: 50
    max_concurrent_scans: 5
    
  # Caching
  caching:
    enabled: true
    ttl_seconds: 300
    max_size_mb: 100
    
  # Rate limiting
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    burst_size: 10

# Development and Testing
development:
  debug_mode: false
  test_mode: false
  mock_threat_feeds: true
  simulate_anomalies: false
  
# Backup and Recovery
backup:
  enabled: true
  schedule: "daily"
  retention_days: 30
  encryption_enabled: true
  backup_location: "/opt/security-audit/backups"

# Health Checks
health_checks:
  enabled: true
  endpoint: "/health"
  interval_seconds: 60
  timeout_seconds: 10
  
# Logging Configuration
logging:
  level: "INFO"
  format: "json"
  file: "/opt/security-audit/logs/enterprise.log"
  max_size_mb: 100
  backup_count: 5
  
  # Structured logging
  structured:
    enabled: true
    include_timestamp: true
    include_severity: true
    include_component: true
